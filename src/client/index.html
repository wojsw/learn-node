<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <div id="loginButton" style="cursor: pointer;">
        登录
    </div>
    <div id="getInformationButton" style="cursor: pointer;">
        获取用户信息
    </div>
    <div id="refreshTokenButton" style="cursor: pointer;">
        刷新Token
    </div>
</body>
</html>

<script>
    let accessToken = null;
    let refreshToken = null;
    // 处理登录区域点击事件的函数。
    async function handleLoginClick() {
        console.log("点击了登录按钮");
        const response = await fetch("http://localhost:3000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: "admin",
                password: "123456"
            })
        });
        const data = await response.json();
        accessToken = data.data.accessToken;
        console.log('accessToken = ', accessToken);
        refreshToken = data.data.refreshToken;
        console.log('refreshToken = ', refreshToken);
    }

    async function getUserInformation() {
        await fetch("http://localhost:3000/api/user/information", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${accessToken}`
            },
        });
    }

    async function refreshTokenHandle() {
        const response = await fetch("http://localhost:3000/api/auth/refresh", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${refreshToken}`
            },
            body: JSON.stringify({
                authorization: refreshToken
            })
        });
        const data = await response.json();
        accessToken = data.data.accessToken;
        console.log('accessToken = ', accessToken);
        refreshToken = data.data.refreshToken;
        console.log('refreshToken = ', refreshToken);
    }

    async function init() {
        try {
            // 获取登录区域节点，用于绑定点击事件。
            const loginButton = document.getElementById("loginButton");

            // 节点存在时才绑定事件，避免页面结构变化导致脚本报错。
            if (loginButton) {
                loginButton.addEventListener("click", handleLoginClick);
            }

            const getInformationButton = document.getElementById("getInformationButton");
            if (getInformationButton) {
                getInformationButton.addEventListener("click", getUserInformation);
            }

            const refreshTokenButton = document.getElementById("refreshTokenButton");
            if (refreshTokenButton) {
                refreshTokenButton.addEventListener("click", refreshTokenHandle);
            }

        } catch (error) {
            console.error("请求失败:", error);
        }
    }

    init();
</script>
