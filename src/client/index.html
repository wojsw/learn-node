<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <div id="loginButton" style="cursor: pointer;">
        登录
    </div>
    <div id="getInformationButton" style="cursor: pointer;">
        获取用户信息
    </div>
    <div id="refreshTokenButton" style="cursor: pointer;">
        刷新Token
    </div>
</body>
</html>

<script>
    // 缓存当前登录态的访问令牌，供业务请求携带鉴权头使用。
    let accessToken = null;
    // 缓存当前登录态的刷新令牌，供访问令牌失效时换取新令牌。
    let refreshToken = null;
    // 统一维护服务端接口基础地址，避免重复硬编码。
    const API_BASE_URL = "http://localhost:3000";

    // 生成默认请求头；当存在令牌时自动补充 Authorization 字段。
    function createRequestHeaders(token) {
        // 初始化基础请求头，保证接口统一按 JSON 传输。
        const headers = {
            "Content-Type": "application/json"
        };

        // 只有存在有效令牌时才追加鉴权头，避免发送无意义字段。
        if (token) {
            headers.Authorization = `Bearer ${token}`;
        }

        return headers;
    }

    // 将登录或刷新接口返回的最新令牌写回本地缓存。
    function updateTokenStore(data) {
        // 更新访问令牌，供后续业务接口重试或继续调用。
        accessToken = data.data.accessToken;
        console.log('accessToken = ', accessToken);
        // 更新刷新令牌，保证下次刷新仍然使用最新凭证。
        refreshToken = data.data.refreshToken;
        console.log('refreshToken = ', refreshToken);
    }

    // 调用刷新令牌接口，获取一组新的访问令牌和刷新令牌。
    async function requestRefreshToken() {
        // 如果当前没有刷新令牌，则直接抛错，交由上层决定如何处理。
        if (!refreshToken) {
            throw new Error("缺少 refreshToken，无法刷新登录状态");
        }

        // 发起刷新令牌请求，用当前 refreshToken 换取新的令牌对。
        const response = await fetch(`${API_BASE_URL}/api/auth/refresh`, {
            method: "POST",
            headers: createRequestHeaders(refreshToken),
            body: JSON.stringify({
                authorization: refreshToken
            })
        });

        // 刷新接口本身失败时直接抛错，避免进入无效重试。
        if (!response.ok) {
            throw new Error("刷新 Token 失败");
        }

        // 解析刷新接口返回值，并同步更新本地令牌缓存。
        const data = await response.json();
        updateTokenStore(data);
        return data;
    }

    // 统一封装带自动刷新能力的请求；当响应为 401 时自动刷新后重试一次。
    async function requestWithAutoRefresh(url, options = {}) {
        // 先发起原始请求，保持现有调用方式尽量不变。
        const response = await fetch(url, options);

        // 非 401 直接返回原响应，不额外干预其他状态码处理逻辑。
        if (response.status !== 401) {
            return response;
        }

        // 仅在存在刷新令牌时才尝试自动续期，避免无意义调用刷新接口。
        if (!refreshToken) {
            return response;
        }

        // 刷新成功后，基于原始请求参数重新构造请求头并重试一次。
        await requestRefreshToken();
        // 合并原请求头并覆盖为最新 accessToken，确保重试请求使用新令牌。
        const retryHeaders = {
            ...(options.headers || {}),
            Authorization: `Bearer ${accessToken}`
        };

        return fetch(url, {
            ...options,
            headers: retryHeaders
        });
    }

    // 处理登录区域点击事件的函数。
    async function handleLoginClick() {
        console.log("点击了登录按钮");
        // 调用登录接口，获取首组 accessToken 与 refreshToken。
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: createRequestHeaders(),
            body: JSON.stringify({
                username: "admin",
                password: "123456"
            })
        });
        // 解析登录接口返回数据，并同步更新本地令牌缓存。
        const data = await response.json();
        updateTokenStore(data);
    }

    // 获取用户信息；当访问令牌过期返回 401 时自动刷新后重试。
    async function getUserInformation() {
        await requestWithAutoRefresh(`${API_BASE_URL}/api/user/information`, {
            method: "GET",
            headers: createRequestHeaders(accessToken),
        });
    }

    // 手动触发刷新令牌逻辑，保留原有按钮行为不变。
    async function refreshTokenHandle() {
        await requestRefreshToken();
    }

    // 初始化页面按钮事件，维持现有交互入口不变。
    async function init() {
        try {
            // 获取登录区域节点，用于绑定点击事件。
            const loginButton = document.getElementById("loginButton");

            // 节点存在时才绑定事件，避免页面结构变化导致脚本报错。
            if (loginButton) {
                loginButton.addEventListener("click", handleLoginClick);
            }

            // 获取用户信息按钮节点，用于绑定请求用户信息逻辑。
            const getInformationButton = document.getElementById("getInformationButton");
            if (getInformationButton) {
                getInformationButton.addEventListener("click", getUserInformation);
            }

            // 获取刷新 Token 按钮节点，用于保留手动刷新能力。
            const refreshTokenButton = document.getElementById("refreshTokenButton");
            if (refreshTokenButton) {
                refreshTokenButton.addEventListener("click", refreshTokenHandle);
            }

        } catch (error) {
            console.error("请求失败:", error);
        }
    }

    init();
</script>
